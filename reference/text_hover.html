<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehemiah Particle Chatbox</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            pointer-events: none;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .instruction {
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="instruction">Klik untuk ganti teks</div>
        <div class="instruction">Gerakkan kursor dekat partikel</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uTransition;
        uniform vec2 uMouse;
        uniform float uMouseRadius;
        uniform float uPixelRatio;

        attribute vec3 aTarget1;
        attribute vec3 aTarget2;
        attribute float aSize;
        attribute float aOffset;

        varying float vAlpha;

        void main() {
            // Interpolasi antara posisi 1 dan posisi 2 berdasarkan uTransition
            vec3 target = mix(aTarget1, aTarget2, uTransition);
            
            // Efek floating (mengambang)
            target.x += sin(uTime * 0.5 + aOffset) * 2.0;
            target.y += cos(uTime * 0.4 + aOffset) * 2.0;

            // Interaksi Mouse (Repulsion)
            vec3 vPos = target;
            vec2 mouseDir = vPos.xy - uMouse;
            float dist = length(mouseDir);
            
            if (dist < uMouseRadius) {
                float force = (uMouseRadius - dist) / uMouseRadius;
                vPos.xy += normalize(mouseDir) * force * 40.0;
            }

            vec4 mvPosition = modelViewMatrix * vec4(vPos, 1.0);
            
            // Ukuran partikel disesuaikan dengan pixel ratio dan depth
            gl_PointSize = aSize * uPixelRatio * (500.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;

            vAlpha = 1.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vAlpha;

        void main() {
            // Membuat bentuk lingkaran bercahaya (radial gradient)
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            
            float strength = 1.0 - (dist * 2.0);
            strength = pow(strength, 1.5); // Membuat pusat lebih tajam

            gl_FragColor = vec4(1.0, 1.0, 1.0, strength * vAlpha);
        }
    </script>

    <script>
        /**
         * CONFIG & SETUP
         */
        const PARTICLE_COUNT = 15000;
        const AMBIENT_COUNT = 1000;
        const MOUSE_RADIUS = 70;
        let currentState = 0; // 0: Hallo, 1: Selamat Datang
        let transitionTarget = 0;
        let currentTransition = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        const mouse = new THREE.Vector2(-9999, -9999);

        /**
         * SAMPLING LOGIC (Canvas 2D Offscreen)
         */
        function getCoordinatesFromText(state) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 800;
            canvas.height = 400;

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Chatbox (Bubble)
            ctx.strokeStyle = 'white';
            ctx.fillStyle = 'white';
            ctx.lineWidth = 4;
            
            const x = 100, y = 50, w = 600, h = 250, r = 50;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + 200, y + h);
            ctx.lineTo(150, y + h + 50); // Ekor bubble
            ctx.lineTo(170, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.stroke();

            // Draw Text
            ctx.font = 'bold 45px Arial';
            ctx.textAlign = 'center';
            if (state === 0) {
                ctx.fillText("Hallo aku Nehemiah,", 400, 160);
                ctx.fillText("Salam kenal ya.", 400, 220);
            } else {
                ctx.font = 'bold 60px Arial';
                ctx.fillText("Selamat Datang", 400, 185);
            }

            // Extract Pixels
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const coords = [];
            for (let i = 0; i < imageData.data.length; i += 4) {
                if (imageData.data[i] > 128) { // Jika piksel putih
                    const px = (i / 4) % canvas.width;
                    const py = Math.floor((i / 4) / canvas.width);
                    coords.push({
                        x: px - canvas.width / 2,
                        y: -(py - canvas.height / 2)
                    });
                }
            }
            return coords;
        }

        /**
         * CREATE MAIN PARTICLES
         */
        const coords1 = getCoordinatesFromText(0);
        const coords2 = getCoordinatesFromText(1);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const target1 = new Float32Array(PARTICLE_COUNT * 3);
        const target2 = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);
        const offsets = new Float32Array(PARTICLE_COUNT);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Ambil koordinat secara acak dari hasil sampling jika jumlah piksel berbeda
            const c1 = coords1[i % coords1.length];
            const c2 = coords2[i % coords2.length];

            // Posisi awal acak (ledakan awal)
            positions[i * 3] = (Math.random() - 0.5) * 1000;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 1000;
            positions[i * 3 + 2] = 0;

            target1[i * 3] = c1.x + (Math.random() - 0.5) * 3;
            target1[i * 3 + 1] = c1.y + (Math.random() - 0.5) * 3;
            target1[i * 3 + 2] = 0;

            target2[i * 3] = c2.x + (Math.random() - 0.5) * 3;
            target2[i * 3 + 1] = c2.y + (Math.random() - 0.5) * 3;
            target2[i * 3 + 2] = 0;

            sizes[i] = Math.random() * 2 + 2; // Size 2-4px
            offsets[i] = Math.random() * Math.PI * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aTarget1', new THREE.BufferAttribute(target1, 3));
        geometry.setAttribute('aTarget2', new THREE.BufferAttribute(target2, 3));
        geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('aOffset', new THREE.BufferAttribute(offsets, 1));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uTransition: { value: 0 },
                uMouse: { value: mouse },
                uMouseRadius: { value: MOUSE_RADIUS },
                uPixelRatio: { value: renderer.getPixelRatio() }
            },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true,
            depthTest: false,
            blending: THREE.AdditiveBlending
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        /**
         * CREATE AMBIENT DUST
         */
        const ambientGeo = new THREE.BufferGeometry();
        const ambientPos = new Float32Array(AMBIENT_COUNT * 3);
        for (let i = 0; i < AMBIENT_COUNT; i++) {
            ambientPos[i * 3] = (Math.random() - 0.5) * 1500;
            ambientPos[i * 3 + 1] = (Math.random() - 0.5) * 1000;
            ambientPos[i * 3 + 2] = (Math.random() - 0.5) * 500;
        }
        ambientGeo.setAttribute('position', new THREE.BufferAttribute(ambientPos, 3));
        const ambientMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 1.5,
            transparent: true,
            opacity: 0.2,
            blending: THREE.AdditiveBlending
        });
        const ambientPoints = new THREE.Points(ambientGeo, ambientMat);
        scene.add(ambientPoints);

        /**
         * INTERACTION EVENTS
         */
        window.addEventListener('mousemove', (e) => {
            // Convert mouse to Three.js coordinates
            mouse.x = (e.clientX - window.innerWidth / 2);
            mouse.y = -(e.clientY - window.innerHeight / 2);
        });

        window.addEventListener('click', () => {
            currentState = (currentState === 0) ? 1 : 0;
            transitionTarget = currentState;
        });

        window.addEventListener('dblclick', () => {
            // Efek acak sejenak
            currentTransition += (Math.random() - 0.5) * 0.5;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.uPixelRatio.value = renderer.getPixelRatio();
        });

        /**
         * ANIMATION LOOP
         */
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            material.uniforms.uTime.value = time;

            // Smooth spring-like transition
            const lerpFactor = 0.08;
            currentTransition += (transitionTarget - currentTransition) * lerpFactor;
            material.uniforms.uTransition.value = currentTransition;

            // Ambient movement
            ambientPoints.rotation.y = time * 0.02;
            ambientPoints.rotation.x = time * 0.01;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
