<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEMI'S GARAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<!-- Display: Neue Machina (mechanical/geometric) · Body: Space Grotesk · Mono: Space Mono -->
<link href="https://api.fontshare.com/v2/css?f[]=neue-machina@400,500,800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="armory.css?v=13" />
<!-- Engine is self-contained vanilla JS (manual scroll driver) — no external deps. -->
</head>
<body class="is-loading">

  <!-- ============ LOADER ============ -->
  <div id="loader">
    <div class="ld-mark"></div>
    <div class="ld-title">NEMI'S&nbsp;GARAGE</div>
    <div class="ld-bar"><i></i></div>
    <div class="ld-pct">000%</div>
    <div class="ld-status">SYSTEM BOOTING</div>
  </div>

  <!-- ============ TRANSITION / LOADING BEAT (Page 1 → Page 2, one-way) ============ -->
  <div class="transition" aria-hidden="true">
    <div class="tr-core">
      <div class="tr-ring"></div>
      <div class="tr-label">Deploying Units</div>
      <div class="tr-bar"><i></i></div>
    </div>
  </div>

  <!-- ============ SCROLL TRACK (drives the pinned stage) ============ -->
  <div class="scroll-track">
    <main class="stage" data-phase="1" data-screen-label="Main Hall">

      <!-- backgrounds -->
      <div class="layer layer-bg-dark"></div>
      <div class="layer layer-bg-bright"></div>
      <!-- PAGE-1 reveal: newgif JPG sequence (240 frames, dark→lit EMPTY hall) scrubbed onto canvas -->
      <canvas id="revealCanvas" class="layer"></canvas>
      <!-- PAGE-2 background: idle.mp4 loop (fades in over the held last frame after the beat) -->
      <video id="idle" class="layer" src="generated/idle.mp4" preload="auto" muted loop playsinline></video>
      <div class="layer layer-beam"></div>

      <!-- PHASE 1 — particle figure -->
      <div id="userParticle">
        <div class="pf-glow"></div>
        <div class="pf-figure"></div>
        <div class="pf-particles"></div>
      </div>

      <!-- PHASE 1 hero — temporary hologram standee (placeholder until the particle
           portrait from /hover part lands); dissolves out as the hall powers on -->
      <div id="heroFigure" class="layer" aria-hidden="true">
        <img src="generated/hologram-removebg-preview.png" alt="" />
      </div>

      <!-- ARSENAL (phase 3) -->
      <div class="arsenal">
        <div class="arsenal-floor"></div>
        <!-- .robot[data-id] injected by armory.js -->
      </div>

      <!-- TITLE (layered, themed — replaces the corner logo + AI-looking HUD readout) -->
      <div class="hall-title">
        <span class="ht-main" data-text="NEMI'S GARAGE">NEMI'S GARAGE</span>
        <span class="ht-sub">Wilhelmus Industries</span>
      </div>

      <!-- POWER DOWN — return from Page 2 to the dark, un-lit hall -->
      <button class="home-btn" type="button" aria-label="Power down — return to the dark hall">
        <span class="hb-icon">⏻</span><span class="hb-label">Power Down</span>
      </button>

      <!-- atmosphere -->
      <div class="layer layer-scan"></div>
      <div class="layer layer-vignette"></div>
      <div class="layer layer-grain"></div>

      <!-- whole-hall dimmer: fades in only while the marquee title is hovered -->
      <div class="hall-dim" aria-hidden="true"></div>

      <!-- cinematic transition beat (scrub done → Page 2) -->
      <div class="flash" aria-hidden="true"></div>
      <div class="sys-online" aria-hidden="true"><span>SYSTEM ONLINE</span></div>

      <!-- PHASE 1 hint -->
      <div class="user-hint">
        <div class="uh-label">Scroll to Activate</div>
        <div class="uh-sub">POWER UP THE ARSENAL</div>
        <div class="uh-arrow"></div>
      </div>

      <!-- bottom unit registry -->
      <nav class="unit-nav">
        <div class="unit-nav-rail"><!-- .unit injected by armory.js --></div>
      </nav>

    </main>

    <!-- scroll progress dots -->
    <div class="progress"></div>
  </div>

  <!-- ============ DOSSIER PANEL ============ -->
  <div class="panel-scrim"></div>
  <div class="panel-host">
  <aside class="panel" aria-hidden="true">
    <div class="panel-accent"></div>
    <div class="panel-head">
      <button class="panel-back">◀ Return to Hall</button>
      <span class="panel-desig">MODEL DESIGNATION</span>
      <h2 class="panel-name">UNIT</h2>
      <div class="panel-status">● STATUS — DEPLOYED</div>
    </div>
    <!-- video-demo banner — enable by setting project.demo to a video/page URL -->
    <button class="panel-demo" type="button">
      <span class="pd-play">▶</span>
      <span class="pd-label">Watch Demo</span>
    </button>
    <div class="panel-body">
      <span class="panel-type">TYPE</span>
      <div>
        <div class="field-label">Briefing</div>
        <p class="panel-brief"></p>
      </div>
      <div>
        <div class="field-label">Loadout</div>
        <div class="chips"></div>
      </div>
      <div>
        <div class="field-label">Languages</div>
        <div class="stats"></div>
      </div>
      <div class="panel-links"></div>
    </div>
  </aside>
  </div>

  <!-- ============ RETICLE ============ -->
  <div class="reticle">
    <div class="r-ring"></div>
    <span class="r-corner tl"></span><span class="r-corner tr"></span>
    <span class="r-corner bl"></span><span class="r-corner br"></span>
  </div>

  <script src="armory.js?v=13"></script>
</body>
</html>
