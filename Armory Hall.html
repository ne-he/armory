<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARMORY HALL</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<!-- Display: Neue Machina (mechanical/geometric) · Body: Space Grotesk · Mono: Space Mono -->
<link href="https://api.fontshare.com/v2/css?f[]=neue-machina@400,500,800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="armory.css" />
<!-- GSAP + ScrollTrigger (Page-1 video scrub). If offline, engine falls back to a manual scroll driver. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body class="is-loading">

  <!-- ============ LOADER ============ -->
  <div id="loader">
    <div class="ld-mark"></div>
    <div class="ld-title">ARMORY&nbsp;HALL</div>
    <div class="ld-bar"><i></i></div>
    <div class="ld-pct">000%</div>
    <div class="ld-status">SYSTEM BOOTING</div>
  </div>

  <!-- ============ SCROLL TRACK (drives the pinned stage) ============ -->
  <div class="scroll-track">
    <main class="stage" data-phase="1" data-screen-label="Main Hall">

      <!-- backgrounds -->
      <div class="layer layer-bg-dark"></div>
      <div class="layer layer-bg-bright"></div>
      <!-- PAGE-1 reveal: newgif JPG sequence (240 frames, dark→lit EMPTY hall) scrubbed onto canvas -->
      <canvas id="revealCanvas" class="layer"></canvas>
      <!-- PAGE-2 background: idle.mp4 loop (fades in over the held last frame after the beat) -->
      <video id="idle" class="layer" src="generated/idle.mp4" preload="auto" muted loop playsinline></video>
      <div class="layer layer-beam"></div>

      <!-- PHASE 1 — particle figure -->
      <div id="userParticle">
        <div class="pf-glow"></div>
        <div class="pf-figure"></div>
        <div class="pf-particles"></div>
      </div>

      <!-- ARSENAL (phase 3) -->
      <div class="arsenal">
        <div class="arsenal-floor"></div>
        <!-- .robot[data-id] injected by armory.js -->
      </div>

      <!-- TITLE (layered, themed — replaces the corner logo + AI-looking HUD readout) -->
      <div class="hall-title" aria-hidden="true">
        <span class="ht-main">ARMORY HALL</span>
        <span class="ht-sub">Selected Works · MMXXVI</span>
      </div>

      <!-- atmosphere -->
      <div class="layer layer-scan"></div>
      <div class="layer layer-vignette"></div>
      <div class="layer layer-grain"></div>

      <!-- cinematic transition beat (scrub done → Page 2) -->
      <div class="flash" aria-hidden="true"></div>
      <div class="sys-online" aria-hidden="true"><span>SYSTEM ONLINE</span></div>

      <!-- PHASE 1 hint -->
      <div class="user-hint">
        <div class="uh-label">Scroll to Activate</div>
        <div class="uh-sub">POWER UP THE ARSENAL</div>
        <div class="uh-arrow"></div>
      </div>

      <!-- bottom unit registry -->
      <nav class="unit-nav">
        <div class="unit-nav-rail"><!-- .unit injected by armory.js --></div>
      </nav>

    </main>

    <!-- scroll progress dots -->
    <div class="progress"></div>
  </div>

  <!-- ============ DOSSIER PANEL ============ -->
  <div class="panel-scrim"></div>
  <div class="panel-host">
  <aside class="panel" aria-hidden="true">
    <div class="panel-accent"></div>
    <div class="panel-head">
      <button class="panel-back">◀ Return to Hall</button>
      <span class="panel-desig">MODEL DESIGNATION</span>
      <h2 class="panel-name">UNIT</h2>
      <div class="panel-status">● STATUS — DEPLOYED</div>
    </div>
    <div class="panel-img">
      <div class="pi-grid"></div>
      <div class="pi-fig"></div>
    </div>
    <div class="panel-body">
      <span class="panel-type">TYPE</span>
      <div>
        <div class="field-label">Briefing</div>
        <p class="panel-brief"></p>
      </div>
      <div>
        <div class="field-label">Loadout</div>
        <div class="chips"></div>
      </div>
      <div>
        <div class="field-label">Combat Stats</div>
        <div class="stats"></div>
      </div>
      <div class="panel-links"></div>
    </div>
  </aside>
  </div>

  <!-- ============ RETICLE ============ -->
  <div class="reticle">
    <div class="r-ring"></div>
    <span class="r-corner tl"></span><span class="r-corner tr"></span>
    <span class="r-corner bl"></span><span class="r-corner br"></span>
  </div>

  <script src="armory.js"></script>
</body>
</html>
